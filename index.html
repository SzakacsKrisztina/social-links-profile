<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://fonts.google.com/specimen/Inter">
  <title>Frontend Mentor | Social links profile</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution {
      font-size: 0.6875rem;
      text-align: center;
      color: hsl(0 0 100);
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
    }
  </style>

</head>

<body>

  <div class="card">
    <img class="card__avatar" src="./assets/images/avatar-jessica.jpeg" alt="Profile picture of Jessica Randall">
    <h1 class="card__name">Jessica Randall</h1>
    <!-- tag * num to add several tags for once -->
    <h2 class="card__location">London, United Kingdom</h2>
    <p class="card__bio">"Front-end developer and avid reader."</p>
    <!-- ul>li*5>a -->
    <ul class="card__links">
      <li class="card__items"><a class="card__button" href="">GitHub</a></li>
      <li class="card__items"><a class="card__button" href="">Frontend Mentor</a></li>
      <li class="card__items"><a class="card__button" href="">LinkedIn</a></li>
      <li class="card__items"><a class="card__button" href="">Twitter</a></li>
      <li class="card__items"><a class="card__button" href="">Instagram</a></li>
    </ul>
  </div>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="#">Rico Stark</a>.
  </footer>
</body>

</html>
